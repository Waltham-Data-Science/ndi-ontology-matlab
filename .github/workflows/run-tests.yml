name: Run Tests

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - '.github/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - '.github/workflows/**'

  # Allows manual runs from the Actions tab
  workflow_dispatch:
    inputs:
      matlab_release:
        description: 'MATLAB Release'
        required: false
        default: 'latest'
        type: choice
        options:
          - 'latest'
          - 'R2025a'
          - 'R2024b'
          - 'R2024a'
          - 'R2023b'
          - 'R2023a'
          - 'R2022b'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_tests:
    name: Run tests (MATLAB ${{ inputs.matlab_release || 'latest' }})
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ inputs.matlab_release || 'latest' }}
          cache: true

      - name: Install MatBox
        uses: ehennestad/matbox-actions/install-matbox@v1

      - name: Check code and upload report
        uses: ehennestad/matbox-actions/check-code@v1
        with:
          source_directory: 'src'

      - name: Run tests
        uses: matlab-actions/run-command@v2
        if: always()
        with:
          command: |
            addpath(genpath("src"));
            addpath(genpath("tests"));
            addpath(genpath("tools"));
            testToolbox()

      - name: Restore MATLAB Path
        uses: matlab-actions/run-command@v2
        if: always()
        with:
          command: |
            restoredefaultpath()
            savepath()

      - name: Commit SVG badges if updated
        if: always() && ( github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository )
        uses: ehennestad/matbox-actions/push-badges@v1
        with:
          pr-ref: ${{ github.event.pull_request.head.ref }}
          pr-repo: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "docs/reports/test-results.xml"
